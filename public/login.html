<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — AI Front-Desk</title>
<link rel="stylesheet" href="/css/dashboard.css" />
<style>
  .login-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
  .login-card {
    width: 100%; max-width: 400px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 18px; padding: 36px;
    box-shadow: var(--shadow);
  }
  .login-card .brand { margin-bottom: 6px; }
  .login-card p.sub { color: var(--muted); font-size: 14px; margin: 0 0 26px; }
  .login-card .field { margin-bottom: 16px; }
  .err { color: var(--bad); font-size: 13px; min-height: 18px; margin-top: 6px; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="brand"><span class="dot"></span> Front-Desk <small>console</small></div>
    <p class="sub">Sign in to manage your AI receptionist.</p>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="username" />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" />
    </div>
    <button class="btn primary" style="width:100%" onclick="login()">Sign in</button>
    <div class="err" id="err"></div>
  </div>
</div>
<script>
  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const err = document.getElementById('err');
    err.textContent = '';
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    if (res.ok) { window.location.href = '/dashboard.html'; }
    else { err.textContent = 'Invalid email or password.'; }
  }
  document.getElementById('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
